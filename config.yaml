app:
  name: "Business Bot"
  version: "1.0.0"
  environment: ${ENVIRONMENT:-production}

safety:
  approval_required: ${APPROVAL_REQUIRED:-true}
  daily_budget_eur: ${DAILY_BUDGET_EUR:-1.0}
  audit_enabled: true
  audit_retention_days: 7
  data_retention_hours: 24

llm_routing:
  brainstorm:
    primary: "google"
    fallback: "minimax/minimax-text-latest"
    cost_limit: 0.0
    max_tokens: 1000
  
  analysis:
    primary: "google"
    fallback: "openrouter/openai/gpt-3.5-turbo"
    cost_limit: 0.20
    max_tokens: 1500
  
  planning:
    primary: "google"
    fallback: "openrouter/openai/gpt-3.5-turbo"
    cost_limit: 0.10
    max_tokens: 800

models:
  free_tier:
    - "google"
  
  cheap_tier:
    - "minimax/minimax-text-latest"
    - "openrouter/openai/gpt-3.5-turbo"

discord:
  approval_channel: "bot-approvals"
  log_channel: "bot-logs"

database:
  auto_delete_drafts_after_hours: 24
  auto_delete_logs_after_days: 7
